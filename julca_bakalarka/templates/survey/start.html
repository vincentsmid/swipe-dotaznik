{% extends "base.html" %}
{% block title %}Dotazník – Přihlášení{% endblock %}

{% block head %}
<style>
    .start-page {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 1.5rem;
        text-align: center;
    }
    .start-page h1 { font-size: 1.8rem; }
    .start-page p { color: #6b7280; font-size: 1.05rem; line-height: 1.5; }
    .start-form { width: 100%; display: flex; flex-direction: column; gap: 1rem; }
    .start-form .btn { width: 100%; padding: 1rem; font-size: 1.1rem; }
    .error-msg { color: #dc2626; font-size: 0.9rem; display: none; }
</style>
{% endblock %}

{% block content %}
<div class="start-page">
    <h1>Vítej v dotazníku!</h1>
    <p>Zadej svůj identifikátor, který jsi dostal/a od učitele.</p>
    <form class="start-form" id="startForm">
        <input type="text" id="participantId" placeholder="Tvůj identifikátor" autocomplete="off" required>
        <p class="error-msg" id="errorMsg">Prosím zadej svůj identifikátor.</p>
        <button type="submit" class="btn btn-primary">Pokračovat</button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('startForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const pid = document.getElementById('participantId').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    if (!pid) {
        errorMsg.style.display = 'block';
        return;
    }
    errorMsg.style.display = 'none';
    sessionStorage.setItem('participant_id', pid);
    window.location.href = '/survey/instructions';
});
</script>
{% endblock %}
